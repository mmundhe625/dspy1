<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood-Based Music Recommender</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <div class="container fade-in">
    <h1 class="glow-text">🎧 What's Your Mood Today?</h1>

    <button id="login-btn" class="mood-btn" onclick="login()">Login with Spotify</button>

    <div id="mood-section" style="display: none;">
      <div class="mood-buttons">
        <button class="mood-btn" onclick="showMusic('happy')">😊 Happy</button>
        <button class="mood-btn" onclick="showMusic('sad')">😢 Sad</button>
        <button class="mood-btn" onclick="showMusic('energetic')">⚡ Energetic</button>
        <button class="mood-btn" onclick="showMusic('relaxed')">🌙 Relaxed</button>
      </div>

      <div id="music-display" class="music-display"></div>

      <div class="music-player glass-effect">
        <div class="album-art-wrapper floating">
          <img id="album-art" src="./images/black-disk-art.png" alt="Album Art" />
        </div>
        <div class="song-info">
          <p id="song-title">No song selected</p>
        </div>
        <div class="controls">
          <button id="prev" class="control-btn"><i class="fa-solid fa-backward"></i></button>
          <button id="play" class="control-btn"><i class="fa-solid fa-play"></i></button>
          <button id="pause" class="control-btn"><i class="fa-solid fa-pause"></i></button>
          <button id="next" class="control-btn"><i class="fa-solid fa-forward"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Spotify Web Playback SDK -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <audio id="audio" src="" style="display: none;"></audio> <!-- Fallback, but SDK replaces it -->
  <script src="script.js"></script>
